version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: treasurenet
      POSTGRES_PASSWORD: treasurenet
      POSTGRES_DB: treasurenet
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U treasurenet']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://treasurenet:treasurenet@postgres:5432/treasurenet
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STELLAR_NETWORK: testnet
      JWT_SECRET: change-me-in-production
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/server:/app/apps/server
      - ./packages:/app/packages

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
